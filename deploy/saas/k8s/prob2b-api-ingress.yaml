apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prob2b-api
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts: ["api.prob2b.example.com"]
      secretName: prob2b-api-tls
  rules:
    - host: api.prob2b.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prob2b-api
                port:
                  number: 80
