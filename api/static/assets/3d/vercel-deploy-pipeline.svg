<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">ProB2B Vercel Deploy Pipeline</title>
  <desc id="desc">Kod deposundan test, build, Vercel edge, FastAPI ve B2B servislerine giden profesyonel yayın hattı.</desc>
  <defs>
    <linearGradient id="blue" x1="0" x2="1"><stop stop-color="#7cf7ff"/><stop offset="1" stop-color="#1e8fff"/></linearGradient>
    <linearGradient id="dark" x1="0" x2="1"><stop stop-color="#102846"/><stop offset="1" stop-color="#07111f"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000" flood-opacity=".35"/></filter>
  </defs>
  <rect width="1100" height="620" fill="#07111f"/>
  <g stroke="#1e8fff" stroke-opacity=".2" fill="none"><path d="M90 470h920M155 390h790M220 310h660"/><path d="M160 520 550 130 940 520"/></g>
  <g font-family="Inter,Arial" font-weight="800" text-anchor="middle" filter="url(#shadow)">
    <g transform="translate(70 285)"><polygon points="0,55 105,0 210,55 105,110" fill="url(#blue)"/><polygon points="0,55 105,110 105,185 0,130" fill="#0b2745"/><polygon points="210,55 105,110 105,185 210,130" fill="url(#dark)"/><text x="105" y="64" fill="#04111f">GIT</text><text x="105" y="142" fill="#e6f7ff" font-size="18">commit</text></g>
    <g transform="translate(300 205)"><polygon points="0,55 105,0 210,55 105,110" fill="#ffd166"/><polygon points="0,55 105,110 105,185 0,130" fill="#7a4d00"/><polygon points="210,55 105,110 105,185 210,130" fill="#5b3d00"/><text x="105" y="64" fill="#251600">TEST</text><text x="105" y="142" fill="#fff4cf" font-size="18">pytest</text></g>
    <g transform="translate(530 285)"><polygon points="0,55 105,0 210,55 105,110" fill="#c2a2ff"/><polygon points="0,55 105,110 105,185 0,130" fill="#31215f"/><polygon points="210,55 105,110 105,185 210,130" fill="#25184d"/><text x="105" y="64" fill="#15052f">VERCEL</text><text x="105" y="142" fill="#f2eaff" font-size="18">serverless</text></g>
    <g transform="translate(760 205)"><polygon points="0,55 105,0 210,55 105,110" fill="#9bffb1"/><polygon points="0,55 105,110 105,185 0,130" fill="#0f5132"/><polygon points="210,55 105,110 105,185 210,130" fill="#164f38"/><text x="105" y="64" fill="#041f10">FASTAPI</text><text x="105" y="142" fill="#dfffea" font-size="18">/b2b/*</text></g>
  </g>
  <g stroke="#7cf7ff" stroke-width="6" stroke-linecap="round" opacity=".85" fill="none"><path d="M250 345 320 305"/><path d="M480 305 550 345"/><path d="M710 345 780 305"/></g>
  <g font-family="Inter,Arial" fill="#e6f7ff" font-size="22" font-weight="700"><text x="80" y="80">Başlat → Test Et → Build Al → Vercel'e Yayınla → Üretimi İzle</text><text x="80" y="112" fill="#9fc0d1" font-size="16">ProB2B enterprise deploy akışı: API, dashboard, 3D asset ve compliance endpoint'leri aynı serverless girişten yayınlanır.</text></g>
</svg>
