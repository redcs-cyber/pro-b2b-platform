<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" aria-labelledby="title desc">
  <title id="title">3D B2B Ekosistem Haritası</title>
  <desc id="desc">ERP, bayi portalı, WMS, finans, LLM ve dashboard katmanlarını izometrik bloklar olarak gösterir.</desc>
  <defs>
    <linearGradient id="top" x1="0" x2="1"><stop stop-color="#7cf7ff"/><stop offset="1" stop-color="#1e8fff"/></linearGradient>
    <linearGradient id="side" x1="0" x2="1"><stop stop-color="#0d1d33"/><stop offset="1" stop-color="#123761"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#000" flood-opacity=".35"/></filter>
  </defs>
  <rect width="900" height="540" fill="#07111f"/>
  <g fill="none" stroke="#1e8fff" stroke-opacity=".22"><path d="M90 400h720M150 345h600M210 290h480"/><path d="M160 450 450 145 745 450"/></g>
  <g filter="url(#shadow)" font-family="Inter,Arial" font-weight="700" text-anchor="middle">
    <g transform="translate(145 290)"><polygon points="0,50 95,0 190,50 95,100" fill="url(#top)"/><polygon points="0,50 95,100 95,160 0,110" fill="#0b2745"/><polygon points="190,50 95,100 95,160 190,110" fill="url(#side)"/><text x="95" y="58" fill="#04111f">ERP</text></g>
    <g transform="translate(355 190)"><polygon points="0,50 105,0 210,50 105,100" fill="#ffd166"/><polygon points="0,50 105,100 105,170 0,120" fill="#8a5a00"/><polygon points="210,50 105,100 105,170 210,120" fill="#5b3d00"/><text x="105" y="58" fill="#221600">B2B PORTAL</text></g>
    <g transform="translate(585 295)"><polygon points="0,45 90,0 180,45 90,90" fill="#9bffb1"/><polygon points="0,45 90,90 90,145 0,100" fill="#0f5132"/><polygon points="180,45 90,90 90,145 180,100" fill="#164f38"/><text x="90" y="53" fill="#032112">WMS</text></g>
    <g transform="translate(260 385)"><polygon points="0,42 85,0 170,42 85,84" fill="#ff7ccf"/><polygon points="0,42 85,84 85,130 0,88" fill="#581c43"/><polygon points="170,42 85,84 85,130 170,88" fill="#3d1733"/><text x="85" y="50" fill="#210014">FİNANS</text></g>
    <g transform="translate(505 390)"><polygon points="0,42 85,0 170,42 85,84" fill="#c2a2ff"/><polygon points="0,42 85,84 85,130 0,88" fill="#31215f"/><polygon points="170,42 85,84 85,130 170,88" fill="#25184d"/><text x="85" y="50" fill="#12042f">LLM</text></g>
  </g>
  <g stroke="#7cf7ff" stroke-width="4" stroke-linecap="round" opacity=".85"><path d="M330 335 410 295"/><path d="M560 295 620 340"/><path d="M430 360 360 420"/><path d="M520 360 580 425"/></g>
</svg>
